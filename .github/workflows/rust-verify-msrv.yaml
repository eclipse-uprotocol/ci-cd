# Checks if the Minimum Supported Rust Version (MSRV) declared in a Rust project's
# Cargo.toml is correct, i.e. if the project can be compiled using a Rust toolchain
# of that version.

name: Check MSRV

on:
  workflow_call:

env:
  RUST_TOOLCHAIN: ${{ vars.RUST_TOOLCHAIN || 'stable' }}
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

permissions:
  contents: read # needed for checking out the code

jobs:
  check:
    name: Check crate's MSRV
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        submodules: "recursive"
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with: 
        toolchain: ${{ env.RUST_TOOLCHAIN }}
    - uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
      with:
        tool: cargo-hack
    - name: check MSRV
      run: |
        cargo hack check --rust-version --workspace --all-targets --all-features --ignore-private
