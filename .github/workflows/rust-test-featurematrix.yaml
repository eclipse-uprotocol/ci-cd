# Test all feature combinations on a range of OS platforms

name: Matrix-test

on:
  workflow_call:

env:
  RUST_TOOLCHAIN: ${{ vars.RUST_TOOLCHAIN || 'stable' }}
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  test-all-features:
    name: Test feature combinations
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: "recursive"
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with: 
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-all-features
        run: |
            cargo install cargo-all-features

      - name: Show toolchain information
        working-directory: ${{ github.workspace }}
        run: |
          cargo --version
          rustup toolchain list

      - name: Check all possible feature combinations
        run: |
          cargo all-features check
      - name: Test all possible feature combinations
        run: |
          cargo all-features test


